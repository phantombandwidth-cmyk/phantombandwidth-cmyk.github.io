<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHANTOM BANDWIDTH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* particle canvas */
    #particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* subtle center glow */
    .glow {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.018) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
      animation: glowPulse 8s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
    }

    /* noise overlay */
    .noise {
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
    }

    h1 {
      font-weight: 200;
      font-size: clamp(1.4rem, 4vw, 2.6rem);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: #f0f0f0;
      text-align: center;
      line-height: 1.6;
    }

    h1 .letter {
      display: inline-block;
      opacity: 0;
      filter: blur(8px);
      transform: translateY(6px);
      transition: opacity 0.5s ease, filter 0.5s ease, transform 0.5s ease;
    }

    h1 .letter.visible {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
    }

    h1 .letter.ghost {
      opacity: 0;
      filter: blur(6px);
      transform: translateY(-2px);
      transition: opacity 0.7s ease, filter 0.7s ease, transform 0.7s ease;
    }

    h1 .space {
      display: inline-block;
      width: 0.5em;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: rgba(255, 255, 255, 0.15);
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .divider.visible {
      opacity: 1;
    }

    .link {
      font-weight: 300;
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
      text-decoration: none;
      padding: 0.6rem 0;
      position: relative;
      opacity: 0;
      transition: color 0.4s ease, opacity 0.6s ease;
    }

    .link.visible {
      opacity: 1;
    }

    .link::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 1px;
      background: rgba(255, 255, 255, 0.4);
      transition: width 0.4s ease;
    }

    .link:hover {
      color: rgba(255, 255, 255, 0.7);
    }

    .link:hover::after {
      width: 100%;
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>
  <div class="glow"></div>
  <div class="noise"></div>

  <div class="container">
    <h1 id="title"></h1>
    <div class="divider" id="divider"></div>
    <a class="link" id="link" href="https://groups.google.com/g/folio_testers" target="_blank" rel="noopener noreferrer">Join the Community</a>
  </div>

  <script>
    // --- Particles ---
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function createParticles() {
      particles = [];
      const count = 40;
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.2 + 0.3,
          vy: -(Math.random() * 0.15 + 0.05),
          vx: (Math.random() - 0.5) * 0.1,
          alpha: Math.random() * 0.12 + 0.03,
          baseAlpha: 0,
          targetAlpha: Math.random() * 0.12 + 0.03,
          pulse: Math.random() * Math.PI * 2,
          pulseSpeed: Math.random() * 0.008 + 0.003,
        });
      }
    }
    createParticles();

    function drawParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.pulse += p.pulseSpeed;

        // fade particles in over first few seconds
        if (p.baseAlpha < p.targetAlpha) {
          p.baseAlpha = Math.min(p.baseAlpha + 0.0003, p.targetAlpha);
        }

        const flicker = 0.5 + 0.5 * Math.sin(p.pulse);
        const alpha = p.baseAlpha * (0.4 + 0.6 * flicker);

        // wrap around
        if (p.y < -5) p.y = canvas.height + 5;
        if (p.x < -5) p.x = canvas.width + 5;
        if (p.x > canvas.width + 5) p.x = -5;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.fill();
      }
      requestAnimationFrame(drawParticles);
    }
    drawParticles();

    // --- Letter animation ---
    const text = 'PHANTOM BANDWIDTH';
    const titleEl = document.getElementById('title');
    const dividerEl = document.getElementById('divider');
    const linkEl = document.getElementById('link');

    const letters = [];
    for (const char of text) {
      if (char === ' ') {
        const br = document.createElement('br');
        titleEl.appendChild(br);
        letters.push(null);
      } else {
        const span = document.createElement('span');
        span.className = 'letter';
        span.textContent = char;
        titleEl.appendChild(span);
        letters.push(span);
      }
    }

    const realLetters = letters.filter(l => l !== null);
    const INTRO_STAGGER = 70;

    // Phase 1: initial reveal
    function introReveal() {
      realLetters.forEach((span, i) => {
        setTimeout(() => {
          span.classList.add('visible');
        }, i * INTRO_STAGGER);
      });

      const introDone = realLetters.length * INTRO_STAGGER + 600;

      setTimeout(() => {
        dividerEl.classList.add('visible');
      }, introDone);

      setTimeout(() => {
        linkEl.classList.add('visible');
      }, introDone + 200);

      // start the loop after everything is visible
      setTimeout(startLoop, introDone + 1800);
    }

    // Phase 2: random disappear, sequential reappear, loop
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function startLoop() {
      disappearRandom();
    }

    function disappearRandom() {
      const order = shuffle(realLetters.map((_, i) => i));
      const interval = 220;

      order.forEach((idx, step) => {
        setTimeout(() => {
          realLetters[idx].classList.remove('visible');
          realLetters[idx].classList.add('ghost');
        }, step * interval);
      });

      const disappearDone = order.length * interval + 800;
      setTimeout(reappearSequential, disappearDone);
    }

    function reappearSequential() {
      const interval = 80;

      realLetters.forEach((span, i) => {
        setTimeout(() => {
          span.classList.remove('ghost');
          span.classList.add('visible');
        }, i * interval);
      });

      const reappearDone = realLetters.length * interval + 2500;
      setTimeout(disappearRandom, reappearDone);
    }

    // kick it off
    setTimeout(introReveal, 600);
  </script>
</body>
</html>
